name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-15-intel
          - macos-latest
          # Windows prebuild is temporarily unsupported; keep it out of CI
          # until a Windows runtime is needed by a production consumer.
          # - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      # Windows-only node-gyp setup stays disabled with the Windows matrix.
      # - if: runner.os == 'Windows'
      #   run: npm install -g node-gyp
      - run: bun install --ignore-scripts
      - run: bun run prebuild
      - run: node test/test.js
      - run: bun ./test/test.js
